<!DOCTYPE html>

<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
        <title>{% block title %}Cognisearch{% endblock %}</title>
    </head>
    <body>
        <nav id="navbar">
            <div id="logo"><a id="logo-link" href="{{ url_for('home') }}">Cognisearch</div>

            <div id="nav-links">
                <a href="{{ url_for('about') }}">About</a>
                <a href="{{ url_for('search') }}">Search</a>
                <a href="https://github.com/GulsherThePython/Cognisearch">Github</a>
            </div>
        </nav>

        <div class="container">
            {% block content %}{% endblock %}
        </div>
    </body>
</html>
